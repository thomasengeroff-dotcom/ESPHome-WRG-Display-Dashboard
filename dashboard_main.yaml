substitutions:
  device_name: "wrg-dashboard"
  friendly_name: "WRG Dashboard"
  # Diese Substitutions machen es einfach, das gezeigte Lüftungsgerät in ESPHome zu ändern
  # (Konfigurierbar über das ESPHome Dashboard vor dem Kompilieren)
  target_ventilation_device: "ESP-WRG-Lüftung 859670"
  target_co2_sensor: "sensor.espwrglueftung_effektiver_co2_wert"
  target_humidity_sensor: "sensor.espwrglueftung_scd41_luftfeuchtigkeit"
  target_temp_sensor: "sensor.espwrglueftung_bmp390_temperatur"
  target_pressure_sensor: "sensor.espwrglueftung_bmp390_luftdruck"
  target_radar_sensor: "binary_sensor.espwrglueftung_radar_presence"
  target_fan: "fan.espwrglueftung_luefter" # Placeholder if fan is added, but using select/number for controls
  target_mode_select: "select.espwrglueftung_lueftermodus"
  target_fan_intensity: "number.espwrglueftung_lufter_intensitat"
  # Diagnostik Entitäten
  target_iaq_sensor: "sensor.espwrglueftung_bme680_iaq_index"
  target_efficiency_sensor: "sensor.espwrglueftung_warmeruckgewinnung_effizienz"
  target_zuluft_temp: "sensor.espwrglueftung_temperatur_zuluft_innen"
  target_abluft_temp: "sensor.espwrglueftung_temperatur_abluft_aussen"
  target_filter_alarm: "binary_sensor.espwrglueftung_filterwechsel_alarm"

esp32:
  board: esp32-s3-devkitc-1 # Standard S3 DevKit Profile
  framework:
    type: esp-idf
    version: recommended

# Wichtig für den S3, damit der USB-Port nach dem Flashen aktiv bleibt:
logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG


# PSRAM ist zwingend erforderlich für RGB Displays & LVGL
psram:
  mode: octal

# ---------------------------------------------------------
# WIFI CONNECTIVITY
# ---------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  # Fallback Hotspot:
  # If the configured WiFi is not reachable within 1 minute, the device
  # opens its own Hotspot (Captive Portal) to allow reconfiguration.
  ap:
    ssid: "${device_name} Hotspot"
    password: !secret appw

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

# ---------------------------------------------------------
# Zeit synchronisation für den Mainscreen
# ---------------------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Berlin"

# ---------------------------------------------------------
# BME680 Sensor & PCA9554 (Lokal am Dashboard)
# ---------------------------------------------------------
i2c:
  id: i2c_bus
  sda: GPIO8 # Adafruit Qualia I2C SDA
  scl: GPIO18 # Adafruit Qualia I2C SCL
  scan: true
  frequency: 400kHz

# Custom C++ Init-Routine für das Display über den PCA9554 (I2C)
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - qualia_init.h

  on_boot:
    priority: 800
    then:
      - lambda: |-
          auto my_init = new esphome::qualia::QualiaDisplayInit();
          // Set the I2C ID and the correct address for the Qualia PCA9554
          my_init->set_i2c_bus(id(i2c_bus));
          my_init->set_i2c_address(0x3F);
          my_init->setup();

bme68x_bsec2_i2c:
  address: 0x77 # Adafruit BME680 Standard
  i2c_id: i2c_bus
  model: bme680

sensor:
  - platform: bme68x_bsec2
    temperature:
      name: "Dashboard Temperatur"
      id: local_temp
    humidity:
      name: "Dashboard Feuchtigkeit"
      id: local_hum
    pressure:
      name: "Dashboard Luftdruck"
      id: local_pres
    iaq:
      name: "Dashboard IAQ"
      id: local_iaq

  - platform: homeassistant
    id: ha_iaq
    entity_id: ${target_iaq_sensor}
  - platform: homeassistant
    id: ha_efficiency
    entity_id: ${target_efficiency_sensor}
  - platform: homeassistant
    id: ha_zuluft_temp
    entity_id: ${target_zuluft_temp}
  - platform: homeassistant
    id: ha_abluft_temp
    entity_id: ${target_abluft_temp}

  - platform: homeassistant
    id: ha_vent_intensity
    entity_id: ${target_fan_intensity}
  - platform: homeassistant
    id: ha_vent_co2
    entity_id: ${target_co2_sensor}
  - platform: homeassistant
    id: ha_vent_humidity
    entity_id: ${target_humidity_sensor}
  - platform: homeassistant
    id: ha_vent_temp
    entity_id: ${target_temp_sensor}
  - platform: homeassistant
    id: ha_vent_pressure
    entity_id: ${target_pressure_sensor}

# ---------------------------------------------------------
# Home Assistant Sensoren (Daten vom Lüftungsgerät)
# ---------------------------------------------------------
text_sensor:
  - platform: homeassistant
    id: ha_vent_mode
    entity_id: ${target_mode_select}

binary_sensor:
  - platform: homeassistant
    id: ha_vent_radar
    entity_id: ${target_radar_sensor}

  # Hinweis: Die Erkennung ob der PID aktuell _regelt_, lässt sich am besten
  # über den "pid_demand" oder die Differenz zum Grenzwert (z.B. auto_co2_threshold) abbilden.
  # Wir importieren hier beispielhaft einen (fiktiven) PID Status Sensor, den du in HA anlegen müsstest.
  - platform: homeassistant
    id: ha_pid_co2_active
    entity_id: binary_sensor.wrg_pid_co2_active

  - platform: homeassistant
    id: ha_pid_hum_active
    entity_id: binary_sensor.wrg_pid_hum_active

  - platform: homeassistant
    id: ha_filter_alarm
    entity_id: ${target_filter_alarm}

# ---------------------------------------------------------
# Display & Touch Konfiguration
# ---------------------------------------------------------
# Adafruit Qualia nutzt intern einen I2C Expander (TCA9554) für das SPI Init
# des ST7701S. Da ESPHome das Bitbanging über I2C-Expander für SPI-TFTs noch
# nicht nativ unterstützt, wird hier standard RGB-TFT deklariert.
# Für einen realen Build auf dem Qualia bedarf es eines Custom C++ Init-Scripts!
display:
  - platform: rpi_dpi_rgb
    id: tft_display
    rotation: 90
    color_order: RGB
    dimensions:
      width: 320
      height: 820
    # Exact Pins for Adafruit Qualia ESP32-S3 RGB-666 Display
    pclk_frequency: 16MHz
    pclk_inverted: true
    hsync_pulse_width: 3
    hsync_back_porch: 251
    hsync_front_porch: 150
    vsync_pulse_width: 6
    vsync_back_porch: 90
    vsync_front_porch: 100
    de_pin: GPIO2
    hsync_pin: GPIO41
    vsync_pin: GPIO42
    pclk_pin: GPIO1
    data_pins:
      blue: [GPIO40, GPIO39, GPIO38, GPIO0, GPIO45]
      green: [GPIO48, GPIO47, GPIO21, GPIO14, GPIO13, GPIO12]
      red: [GPIO11, GPIO10, GPIO9, GPIO46, GPIO3]

touchscreen:
  - platform: ft63x6
    id: my_touch
    i2c_id: i2c_bus
    transform:
      swap_xy: true
      mirror_x: true
    # We purposefully exclude the interrupt_pin because it resides on the PCA9554. 
    # ESPHome will poll the touch controller over I2C, avoiding any I2C bus contention 
    # with the custom qualia_init.h C++ display initialization routine.

# Bind the LVGL UI
packages:
  ui: !include dashboard_ui.yaml

# ---------------------------------------------------------
# UI Update Loop (Aktualisiert die LVGL Labels)
# ---------------------------------------------------------
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: label_time
          text:
            format: "%02d:%02d"
            args: ["id(sntp_time).now().hour", "id(sntp_time).now().minute"]
      - lvgl.label.update:
          id: label_date
          text:
            format: "%02d. %02d."
            args:
              ["id(sntp_time).now().day_of_month", "id(sntp_time).now().month"]
      - lvgl.label.update:
          id: label_local_temp
          text:
            format: "%.1f °C"
            args: ["id(local_temp).state"]
      - lvgl.label.update:
          id: label_local_hum
          text:
            format: "%.1f %%"
            args: ["id(local_hum).state"]
      - lvgl.label.update:
          id: label_local_iaq
          text:
            format: "%.0f"
            args: ["id(local_iaq).state"]
      - lvgl.label.update:
          id: label_vent_mode
          text:
            format: "Modus:\n%s"
            args: ["id(ha_vent_mode).state.c_str()"]
      - lvgl.label.update:
          id: label_vent_intensity
          text:
            format: "Lüfter:\n%.0f / 10"
            args: ["id(ha_vent_intensity).state"]
      - lvgl.label.update:
          id: label_vent_temp
          text:
            format: "Temp:\n%.1f °C"
            args: ["id(ha_vent_temp).state"]
      - lvgl.label.update:
          id: label_vent_co2
          text:
            format: "CO2:\n%.0f ppm"
            args: ["id(ha_vent_co2).state"]
      - lvgl.label.update:
          id: label_vent_humidity
          text:
            format: "Feuchte:\n%.1f %%"
            args: ["id(ha_vent_humidity).state"]
      - lvgl.label.update:
          id: label_vent_radar
          text:
            format: "Radar:\n%s"
            args: ['id(ha_vent_radar).state ? "Ja" : "Nein"']
      - lvgl.label.update:
          id: label_pid_status
          text:
            format: "Automatik aktiv:\n%s"
            args:
              [
                'id(ha_pid_co2_active).state ? "CO2 Regler" : (id(ha_pid_hum_active).state ? "Feuchteschutz" : "Idle (Kein Eingriff)")',
              ]
      - lvgl.label.update:
          id: label_iaq_index
          text:
            format: "IAQ Index:\n%.0f"
            args: ["id(ha_iaq).state"]
      - lvgl.label.update:
          id: label_efficiency
          text:
            format: "Effizienz:\n%.1f %%"
            args: ["id(ha_efficiency).state"]
      - lvgl.label.update:
          id: label_zuluft_temp
          text:
            format: "Zuluft:\n%.1f °C"
            args: ["id(ha_zuluft_temp).state"]
      - lvgl.label.update:
          id: label_abluft_temp
          text:
            format: "Abluft:\n%.1f °C"
            args: ["id(ha_abluft_temp).state"]
      - lvgl.label.update:
          id: label_filter_status
          text:
            format: "Filter:\n%s"
            args: ['id(ha_filter_alarm).state ? "WECHSELN!" : "OK"']
